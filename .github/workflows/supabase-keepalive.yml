name: Supabase keep-alive

on:
  schedule:
    # Runs every day at 10:00 UTC — well within the 7-day inactivity window
    - cron: '0 10 * * *'
  workflow_dispatch: # allow manual trigger from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Unexpected status $STATUS — check project health"
            exit 1
          fi
